# Astra check — runs on every push + pull request to verify the
# build is in a deployable state. Railway handles the actual deploy
# via its GitHub integration on push to main; this workflow's job
# is to catch broken commits BEFORE Railway picks them up.
#
# Why two stages instead of one:
#   `quick-check` runs in <30s and catches the cheap problems
#   (Python syntax, import-time errors, alembic migration order).
#   `test` runs the unit-test suite which needs a Postgres + pgvector
#   service; takes ~3min. PR feedback comes from quick-check fast,
#   then test gates the merge.

name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quick-check:
    name: import + alembic head
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install
        run: pip install -e .
      - name: import smoke
        # If anything in astra/ raises ImportError at module load
        # (missing dep, syntax error, circular import) this catches it.
        # `astra.core.agent` was removed in the lean-runtime migration
        # (Phase 6, 2026-05-04) — replaced with `astra.runtime.agent_loop`.
        # The workflow wasn't updated at the time, so every push to main
        # since has silently failed this step. Caught while the new
        # smoke workflow was being landed.
        run: |
          python -c "import astra.config, astra.scheduler.app, astra.runtime.agent_loop"
      - name: alembic single head
        # Catch the classic merge-conflict pattern where two PRs each
        # add a migration and we end up with multiple alembic heads.
        run: |
          python -m alembic heads | tee /tmp/heads.txt
          [ "$(grep -c '(head)' /tmp/heads.txt)" = "1" ] || (echo "multiple alembic heads detected" && exit 1)

  test:
    name: pytest
    runs-on: ubuntu-latest
    needs: quick-check
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: astra
          POSTGRES_PASSWORD: astra_dev
          POSTGRES_DB: astra
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U astra" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://astra:astra_dev@localhost:5432/astra
      ANTHROPIC_API_KEY: dummy-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install
        run: |
          pip install -e .
          pip install pytest pytest-asyncio
      - name: alembic upgrade head
        run: python -m alembic upgrade head
      - name: pytest
        # HARD GATE since 2026-06-11. The soft-fail (`|| echo`) this
        # replaced meant every push since the job was added could ship
        # arbitrary test regressions — and did: 6 SDK-era test
        # corpses failed every run for 5+ weeks with a green check.
        # Those tests are fixed; environment-dependent ones (redis)
        # now skip instead of fail. Full suite verified green against
        # a clean localhost Postgres before this flag was flipped.
        # If this step is red, the commit is broken. Fix it, don't
        # soften the gate.
        run: pytest --tb=short
