# BAY (Black And Yellow Squash) brand kit
# Sources: BAY-Brand-Identity-System.html.pdf (canonical visual identity),
# theblackandyellow.com (live site — accessibility-led voice),
# share #12 in Astra (the recent BAY pitch deck).
# Last refresh: 2026-05-02

# ── Canonical decisions (resolved) ──────────────────────────────────
#
# Color: GOLD (#D4A843) is canonical — confirmed by Kunal 2026-05-02.
# The brand name is "Black and Yellow", but the visual identity uses
# gold, not bright yellow. The name is the legacy reference (Double
# Yellow Dot in pro squash); the visual is gold.
#
# Programs (current operating reality, Pilot Centre at Badhwar Park):
#   1. Experience  2. Community  3. Grassroots  4. Excellence
#   + Street to Elite — launching at the Pilot Centre
#
# Yet to come (future flagship Excellence Centre):
#   - Experience Centres (Coorg / Mulshi / Alibaug — wellness-paradise
#     model)
#   - Nutrition Cafe (ground-floor Social Zone)
#   - Membership tiers
#
# The BI PDF's broader 4-vertical vision (Excellence Centre / BAY
# Experience Centres / Squash Jailbreak / Outreach) is the long-horizon
# build-out; the Pilot Centre at Badhwar Park is the current operating
# reality. Audience docs use either framing depending on whether the
# reader needs current-state or future-vision context.

name: "Black And Yellow"
slug: "bay"

tagline_short: "Liberating Squash"
tagline_long: "BAY is a performance institution — India's first vertical ecosystem where Olympic ambition, clinical wellness, and cultural prestige converge under one uncompromising standard."
about: |
  BAY (Black and Yellow Squash) exists at the intersection of
  discipline and desire — where the rigor of elite sport meets the
  sensibility of architectural luxury. Performance institution, not
  a club. Members are athletes, not customers.

# ── Visual brand ────────────────────────────────────────────────────

brand:
  colors:
    # Per BAY-Brand-Identity-System.html.pdf:
    # 85% deep black, 10% gold accent, 5% warm ivory relief.
    primary: "#0A0A0A"           # Deep black (dominant)
    secondary: "#D4A843"          # Gold accent — canonical (NOT bright yellow despite the name)
    surface: "#F5F2ED"            # Warm ivory
    ink: "#0A0A0A"
    muted: "#6B6B6B"
    chart:
      - "#0A0A0A"
      - "#D4A843"
      - "#F5F2ED"

  typography:
    # Per the brand identity PDF.
    display:
      family: "Bebas Neue"
      fallback: "'Oswald', 'Impact', sans-serif"
    body:
      family: "Archivo"
      fallback: "system-ui, -apple-system, sans-serif"
    mono:
      family: "JetBrains Mono"
      fallback: "monospace"

  logo:
    # Wordmark "BAY" in geometric serif-influenced display +
    # Double Dot device + "BLACK AND YELLOW" wide-tracked.
    # ⚠️ Not yet extracted from BI PDF — placeholder paths.
    full_light: "content/logos/full-light.svg"
    full_dark: "content/logos/full-dark.svg"
    mark_light: "content/logos/mark-light.svg"
    mark_dark: "content/logos/mark-dark.svg"

  imagery:
    style: "Architectural precision; high-contrast black-and-gold; movement-focused sport photography (motion-blurred glass-court action, athlete-portrait-low-key); minimalist layouts with generous negative space; numbered chapters as compositional device; zero stock-fitness imagery."

# ── References ──────────────────────────────────────────────────────

voice_file: "voice.md"
thesis_file: "thesis.md"
audiences_dir: "audiences/"
content_dir: "content/"

# ── Forbidden phrases ──────────────────────────────────────────────

forbidden_phrases:
  - "AI-powered"
  - "lifestyle"
  - "wellness brand"
  - "boutique fitness"
  - "world-class"
  - "premium"
  - "best-in-class"
  - "fitness center"
  - "gym"
  - "squash club"          # we are a performance institution
  - "members"              # they are athletes
  - "customers"            # they are athletes
  - "trendy"

output:
  doc_page_size: "A4"
  slide_aspect: "16:9"
  slide_footer: true
  slide_numbers: true
