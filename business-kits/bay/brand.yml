# BAY (Black And Yellow Squash) brand kit
# Auto-filled from compass + the BAY deck Kunal shared (share #12).

name: "Black And Yellow Squash"
slug: "bay"

tagline_short: "India's first performance institution for squash"
tagline_long: "Black And Yellow — where Olympic ambition, clinical wellness, and cultural prestige converge under one uncompromising standard."
about: |
  BAY is India's first performance institution dedicated to squash.
  A vertical ecosystem: 5 programs from grassroots to elite training,
  outdoor all-glass courts, an outreach initiative for underserved
  communities. Operating from Colaba and BKC, Mumbai. Founded by
  Kunal Singh (India Rank 18, 2024 WUC Bronze).

