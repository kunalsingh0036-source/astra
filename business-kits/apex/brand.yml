# Apex Human Company brand kit
# Sources: apex_human_brand_guidelines_v2.docx (typography + voice rules),
# Apex_Human_Growth_Strategy_Final.pdf (hex codes + positioning),
# theapexhumancompany.com (current public expression).
# Last refresh: 2026-05-02

name: "The Apex Human Company"
slug: "apex"

tagline_short: "Your Brand. Your People. No Compromise."
tagline_long: "We are the only end-to-end design-led manufacturer in India that delivers premium quality equivalent to Lacoste and Ralph Lauren, branded entirely as your company, at factory-direct pricing — with a design studio, AQL 2.5 QC, and Naval Forces-grade delivery standards included."
about: |
  The Apex Human Company is India's premier design-led, end-to-end
  corporate merchandise and apparel manufacturer. Zero middlemen.
  Same quality as premium brands, branded as yours. Factory-direct
  with AQL 2.5 QC and Naval Forces-grade delivery standards.

# ── Visual brand ────────────────────────────────────────────────────

brand:
  colors:
    # Per Apex_Human_Growth_Strategy_Final.pdf:
    # Deep crimson dominant against warm parchment surface.
    primary: "#7B1A2E"          # Deep institutional crimson-maroon
    secondary: "#C9A96E"         # Crème/gold accent (per brand guidelines)
    surface: "#FAF6F0"           # Warm parchment off-white
    ink: "#1A1A1A"               # Near-black for body
    muted: "#6B6B6B"
    chart:
      - "#7B1A2E"
      - "#C9A96E"
      - "#1A1A1A"
      - "#FAF6F0"

  typography:
    # Per apex_human_brand_guidelines_v2.docx — serif heritage,
    # signaling craft and authority.
    display:
      family: "Palatino Linotype"
      fallback: "'Palatino', 'Hoefler Text', Georgia, serif"
    body:
      family: "Georgia"
      fallback: "'Times New Roman', serif"
    mono:
      family: "JetBrains Mono"
      fallback: "monospace"

  logo:
    # The wordmark "THE APEX HUMAN COMPANY" — full caps, designated
    # typeface, deep crimson on crème or crème on deep crimson.
    full_light: "content/logos/apex-logo.pdf"
    full_dark: "content/logos/apex-logo.pdf"
    mark_light: "content/logos/apex-logo.png"
    mark_dark: "content/logos/apex-logo.png"

  imagery:
    style: "Premium product photography on plain backdrops; institutional contexts (corporate offsites, naval vessels); zero fashion-editorial styling. Imagery should signal weight, craft, and use — not display."

# ── References ──────────────────────────────────────────────────────

voice_file: "voice.md"
thesis_file: "thesis.md"
audiences_dir: "audiences/"
content_dir: "content/"

# ── Forbidden phrases ──────────────────────────────────────────────

forbidden_phrases:
  - "AI-powered"
  - "leverage synergies"
  - "revolutionary"
  - "world-class"
  - "best-in-class"
  - "premium"               # describe the GSM / cert / standard instead
  - "luxury brand"           # we are luxury manufacturing, not a luxury brand
  - "fashion-forward"
  - "lifestyle"              # wrong category
  - "merch"                  # for our own product line; client merch is "merchandise"

output:
  doc_page_size: "A4"
  slide_aspect: "16:9"
  slide_footer: true
  slide_numbers: true
