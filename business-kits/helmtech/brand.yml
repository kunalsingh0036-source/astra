# HelmTech brand kit
# Sources:
#   HelmTech_BrandIdentity.pdf — CANONICAL formal identity (Kunal-confirmed
#     2026-05-02; helmtech.in implementation needs to be brought into line)
#   helmtech-outreach-agent/backend/app/core/brand_voice.py — lived SMB voice
#   business_helmtech.md (compass) — investor / institutional positioning
# Last refresh: 2026-05-02

# ── Canonical decisions (resolved) ──────────────────────────────────
#
# Brand identity: HelmTech_BrandIdentity.pdf is canonical — Matte
# Black + Emerald Green (#2ECC71) + Soft Sand (#E8DFD6) with
# Satoshi/Poppins. The live site at helmtech.in currently uses an
# off-spec acid-green palette + Inter; this is a site-implementation
# bug, NOT a brand decision. The site should be updated to match the
# BI PDF.
#
# Voice: HelmTech operates two voice registers — both authentic:
#   - SMB-customer voice (per brand_voice.py): the website-and-agent
#     arm — direct, practical, Hinglish-comfortable, ₹15k/30k/45k
#     pricing-stated-plainly
#   - Investor / institutional / product voice: the application-layer
#     and platform thesis — decisive, infrastructure-framed,
#     "AI backbone of the country"
# Audience persona files in audiences/ pick which register applies.

# ── Umbrella positioning ────────────────────────────────────────────
#
# HelmTech is an umbrella company working two-fold simultaneously,
# both feeding the end-state ambition:
#
# End-state: India's sovereign intelligence layer — the AI backbone
# of the country. Build our own foundational models. Train them. Own
# the rails the country runs on.
#
# Path to there (today, both arms running in parallel):
#
#   1. APPLICATION-LAYER AI PRODUCTS — Shotgun (prosumer AI platform,
#      520+ tools), Buckshot (AI film-making aggregator). World-facing
#      Indian-built tools. National + worldwide consequences. These
#      generate the credibility, financial muscle, and investment
#      that funds the foundational-model ambition.
#
#   2. INDIAN SMB DIGITAL ARM — websites + AI agents at ₹15k/30k/45k
#      via helmtech.in. Brings Indian SMBs onto the digital map.
#      Generates short-term capital + on-the-ground credibility.
#
# Both arms are real businesses today. Both feed the bigger goal.
# The kit's audience personas reflect this: SMB-side audiences for
# arm 2; investor / partner / enterprise audiences for arm 1 + the
# end-state thesis.

name: "Helm Tech"
slug: "helmtech"

tagline_short: "Building India's AI Backbone"
tagline_long: "A world where every business — from a local shop to a global enterprise — has an intelligent digital presence that works as hard as its founder."
about: |
  Helm Tech empowers businesses of every size with intelligent,
  beautifully designed digital systems that drive growth — combining
  world-class websites with AI-powered customer-engagement agents.
  Strategic mission: build the execution layer for India's
  intelligence economy.

# ── Visual brand ────────────────────────────────────────────────────

brand:
  colors:
    # Per HelmTech_BrandIdentity.pdf — the formal identity.
    primary: "#111111"           # Matte Black — authority, grounding
    secondary: "#2ECC71"          # Emerald Green — growth, technology accent
    surface: "#E8DFD6"            # Soft Sand — warm, distinct from generic white
    ink: "#111111"
    muted: "#6B6B6B"
    chart:
      - "#111111"
      - "#2ECC71"
      - "#E8DFD6"

  typography:
    # Per HelmTech_BrandIdentity.pdf
    display:
      family: "Satoshi"
      fallback: "'Inter', 'Helvetica Neue', system-ui, sans-serif"
    body:
      family: "Poppins"
      fallback: "'Inter', 'Helvetica Neue', system-ui, sans-serif"
    mono:
      family: "JetBrains Mono"
      fallback: "monospace"

  logo:
    # "HELM TECH" wordmark — wide-tracked bold uppercase.
    # Soft Sand on Matte Black for dark backgrounds.
    # Matte Black on Soft Sand for light backgrounds.
    full_light: "content/logos/logo-light.svg"
    full_dark: "content/logos/logo-dark.svg"
    mark_light: "content/logos/logo.svg"
    mark_dark: "content/logos/logo.svg"

  imagery:
    style: "High-contrast, geometric, with terminal/CLI motifs (matching the helmtech.in implementation). Photography is architectural/industrial when used; primary imagery is typography-driven and product-screenshot-driven. No glowing brain abstractions, no stock-photo people, no AI visual clichés."

# ── References ──────────────────────────────────────────────────────

voice_file: "voice.md"
thesis_file: "thesis.md"
audiences_dir: "audiences/"
content_dir: "content/"

# ── Forbidden phrases ──────────────────────────────────────────────

forbidden_phrases:
  - "AI-powered"            # Generic. Describe what it does instead.
  - "leverage synergies"
  - "revolutionary"
  - "disruptive"
  - "world-class"
  - "best-in-class"
  - "cutting-edge"
  - "next-generation"
  - "ChatGPT for India"
  - "AI assistant"          # Too generic
  - "intelligent automation"
  - "democratize AI"
  - "unicorn"
  - "decacorn"

output:
  doc_page_size: "A4"
  slide_aspect: "16:9"
  slide_footer: true
  slide_numbers: true
