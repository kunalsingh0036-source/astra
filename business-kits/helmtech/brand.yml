# HelmTech brand kit
# Sources:
#   HelmTech_BrandIdentity.pdf (canonical formal identity — used here)
#   helmtech-outreach-agent/backend/app/core/brand_voice.py (lived SMB voice)
#   helmtech.in (live site — note: site uses different greens/fonts than
#     the formal brand identity PDF; flagged below for Kunal)
#   business_helmtech.md (compass — investor / institutional positioning)
# Last refresh: 2026-05-02

# ⚠️ KNOWN CONFLICTS — Kunal to resolve:
# 1. The brand identity PDF specifies Matte Black + Emerald Green (#2ECC71)
#    + Soft Sand (#E8DFD6) with Satoshi/Poppins fonts. The live site
#    helmtech.in uses acid green (#22C55E) on dark surfaces with what
#    appears to be Inter or similar. The site is not following the
#    brand identity. Locking in the brand identity PDF here as canonical;
#    site should be updated to match (or the brand identity refreshed).
# 2. There are two distinct HelmTech voices in active use:
#    - SMB-customer voice: "websites + AI agents" at ₹15k–₹45k pricing
#    - Investor / institutional voice: "India's Intelligence Layer",
#      $20–30M raise, MCP fabric thesis
#    Both audiences have their own audiences/*.md files; brand.yml
#    represents the formal HelmTech corporate identity (which serves
#    both).

name: "Helm Tech"
slug: "helmtech"

tagline_short: "Building India's AI Backbone"
tagline_long: "A world where every business — from a local shop to a global enterprise — has an intelligent digital presence that works as hard as its founder."
about: |
  Helm Tech empowers businesses of every size with intelligent,
  beautifully designed digital systems that drive growth — combining
  world-class websites with AI-powered customer-engagement agents.
  Strategic mission: build the execution layer for India's
  intelligence economy.

# ── Visual brand ────────────────────────────────────────────────────

brand:
  colors:
    # Per HelmTech_BrandIdentity.pdf — the formal identity.
    primary: "#111111"           # Matte Black — authority, grounding
    secondary: "#2ECC71"          # Emerald Green — growth, technology accent
    surface: "#E8DFD6"            # Soft Sand — warm, distinct from generic white
    ink: "#111111"
    muted: "#6B6B6B"
    chart:
      - "#111111"
      - "#2ECC71"
      - "#E8DFD6"

  typography:
    # Per HelmTech_BrandIdentity.pdf
    display:
      family: "Satoshi"
      fallback: "'Inter', 'Helvetica Neue', system-ui, sans-serif"
    body:
      family: "Poppins"
      fallback: "'Inter', 'Helvetica Neue', system-ui, sans-serif"
    mono:
      family: "JetBrains Mono"
      fallback: "monospace"

  logo:
    # "HELM TECH" wordmark — wide-tracked bold uppercase.
    # Soft Sand on Matte Black for dark backgrounds.
    # Matte Black on Soft Sand for light backgrounds.
    full_light: "content/logos/logo-light.svg"
    full_dark: "content/logos/logo-dark.svg"
    mark_light: "content/logos/logo.svg"
    mark_dark: "content/logos/logo.svg"

  imagery:
    style: "High-contrast, geometric, with terminal/CLI motifs (matching the helmtech.in implementation). Photography is architectural/industrial when used; primary imagery is typography-driven and product-screenshot-driven. No glowing brain abstractions, no stock-photo people, no AI visual clichés."

# ── References ──────────────────────────────────────────────────────

voice_file: "voice.md"
thesis_file: "thesis.md"
audiences_dir: "audiences/"
content_dir: "content/"

# ── Forbidden phrases ──────────────────────────────────────────────

forbidden_phrases:
  - "AI-powered"            # Generic. Describe what it does instead.
  - "leverage synergies"
  - "revolutionary"
  - "disruptive"
  - "world-class"
  - "best-in-class"
  - "cutting-edge"
  - "next-generation"
  - "ChatGPT for India"
  - "AI assistant"          # Too generic
  - "intelligent automation"
  - "democratize AI"
  - "unicorn"
  - "decacorn"

output:
  doc_page_size: "A4"
  slide_aspect: "16:9"
  slide_footer: true
  slide_numbers: true
