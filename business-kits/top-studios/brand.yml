# Top Studios brand kit
# Auto-filled from compass; fewer details than the others (Top
# Studios has the lightest compass entry). Heavier autofill from
# Kunal once brand guidelines arrive.

name: "Top Studios"
slug: "top-studios"

tagline_short: "AI-native film + creative studio"
tagline_long: "<TBD — likely combining AI capability with classical film-making craft>"
about: |
  Top Studios is the media arm of Kunal's portfolio. AI + classical
  film-making craft. Internal: produces marketing for HelmTech,
  Apex, BAY. External: paying clients across creative production,
  brand kits, social content. Editor in seat; AI filmmaker hire next.

# ── Visual brand ───────────────────────────────────────────────────

brand:
  colors:
    primary: "#FF6B35"    # burnt orange — energy, warmth
    secondary: "#1C1410"  # warm black — primary ink
    surface: "#2B2520"    # warm dark surface
    ink: "#1C1410"        # warm black
    muted: "#938A84"      # warm gray
    background: "#FBF8F6" # warm off-white
    chart:
      - "#FF6B35"
      - "#1C1410"
      - "#938A84"
      - "#2B2520"

  typography:
    display:
      family: "Playfair Display"  # high-contrast serif, editorial craft
      fallback: "Georgia, serif"
      weight: "700"  # Bold for display
    body:
      family: "Inter"  # clean contemporary sans
      fallback: "system-ui, -apple-system, sans-serif"
      weight: "400"  # Regular for body
    mono:
      family: "JetBrains Mono"
      fallback: "monospace"

  logo:
    style: "Wordmark-primary with optional geometric mark. Playfair Display bold for 'Top Studios', warm black (#1C1410) on light backgrounds, burnt orange (#FF6B35) accent on the mark. Mark: abstract T+S monogram or film-frame geometry. Avoid cliché film-reel / clapperboard / camera icons."
    full_light: "content/logos/full-light.svg"  # wordmark for light bg
    full_dark: "content/logos/full-dark.svg"    # wordmark for dark bg
    mark_light: "content/logos/mark-light.svg"  # icon/favicon
    mark_dark: "content/logos/mark-dark.svg"

  imagery:
    style: "Film-still aesthetic with warm grain. High-craft composition, shallow DOF, cinematic aspect ratios (2.39:1 preferred). Avoid stock photography — every image should look intentionally shot. Color grade leans warm (matches palette). Behind-the-scenes production shots over polished lifestyle imagery."
    avoid:
      - "Generic stock photos"
      - "Cold/clinical lighting"
      - "Tech product photography aesthetic"
      - "Over-saturated colors"

# ── References ─────────────────────────────────────────────────────

voice_file: "voice.md"
thesis_file: "thesis.md"
audiences_dir: "audiences/"
content_dir: "content/"

forbidden_phrases:
  - "AI-powered"
  - "leverage synergies"
  - "revolutionary"
  - "world-class"
  - "best-in-class"
  - "creative agency"      # we are a studio, not an agency
  - "content creator"      # too generic
  - "branding company"     # too generic

output:
  doc_page_size: "A4"
  slide_aspect: "16:9"
  slide_footer: true
  slide_numbers: true
