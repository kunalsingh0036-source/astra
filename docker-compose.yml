services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: astra-postgres
    environment:
      POSTGRES_USER: astra
      POSTGRES_PASSWORD: astra_dev
      POSTGRES_DB: astra
    ports:
      - "5433:5432"
    volumes:
      - astra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: astra-redis
    ports:
      - "6380:6379"
    volumes:
      - astra_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  astra_pgdata:
  astra_redis:
